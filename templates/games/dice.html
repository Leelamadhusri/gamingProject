{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roll A Dice</title>
    <link rel="stylesheet" href="{% static 'css/dice.css' %}">
</head>
<body>
    <div class="box">
        <h1>🎲 Dice Roll Game</h1>

           <img id="dice1" src="{% static 'images/die1.png' %}" alt="Dice" width="120" onclick="rollDice()">
           <img id="dice2" src="{% static 'images/die2.png' %}" alt="Dice" width="120" onclick="rollDice()">

           <!-- Hidden element that exposes static image URLs to external JS via dataset -->
           <div id="dice-paths" style="display:none"
               data-d1="{% static 'images/die1.png' %}"
               data-d2="{% static 'images/die2.png' %}"
               data-d3="{% static 'images/die3.png' %}"
               data-d4="{% static 'images/die4.png' %}"
               data-d5="{% static 'images/die5.png' %}"
               data-d6="{% static 'images/die6.png' %}"></div>

        <h2 id="result">Roll the dice!</h2>

        <div class="scoreboard">
            <div>Player: <span id="player-score">0</span></div>
            <div>Computer: <span id="computer-score">0</span></div>
            <div>Attempts left: <span id="attempts-left">5</span></div>
        </div>

        <div class="controls">
            <button id="roll-btn">Roll Dice</button>
            <button id="reset-btn">Reset</button>
        </div>
    </div>

    <script src="{% static 'js/dice.js' %}?v=2"></script>
</body>
</html>

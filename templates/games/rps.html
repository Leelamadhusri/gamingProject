{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Rock Paper Scissors</title>
    <link rel="stylesheet" href="{% static 'css/styling.css' %}">

</head>
<body>
    <h1>Rock Paper Scissors</h1>
    <div class="box1">
        <div class="choices">
            <button class="choice-btn" onclick="playGame('rock')">✊ Rock</button>
            <button class="choice-btn" onclick="playGame('paper')">✋ Paper</button>
            <button class="choice-btn" onclick="playGame('scissors')">✌️ Scissors</button>
        </div>

        <div class="scoreboard">
            <div>Player: <span id="player-score">0</span></div>
            <div>Computer: <span id="computer-score">0</span></div>
            <div>Attempts left: <span id="attempts-left">5</span></div>
        </div>

        <p id="computer"></p>
        <h2 id="result">Make your move!</h2>
        <div class="controls">
            <button id="reset-btn">Reset</button>
        </div>
    </div>

    <script src="{% static 'js/index.js' %}"></script>
</body>
</html>
